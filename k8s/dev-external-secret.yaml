apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secret
  namespace: ecommerce-dev
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore

  target:
    name: app-secret

  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: dev/ecommerce/secret
        property: DATABASE_URL