apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce-dev
  labels:
    app: order-service
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8003"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: order-service
          image: 169976490560.dkr.ecr.us-east-1.amazonaws.com/ecommerce-lite/order-service:latest
          ports:
            - containerPort: 8003

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_ENDPOINT

            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_SERVICE_NAME_ORDER

            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: USER_SERVICE_URL

            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PRODUCT_SERVICE_URL

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 8003
            failureThreshold: 10
            periodSeconds: 5