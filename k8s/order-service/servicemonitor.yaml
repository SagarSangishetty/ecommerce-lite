apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-service
  namespace: ecommerce-dev
spec:
  selector:
    matchLabels:
      app: order-service

  namespaceSelector:
    matchNames:
      - ecommerce-dev

  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s